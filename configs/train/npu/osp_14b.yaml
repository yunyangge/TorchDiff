# test yaml

model_name: "osp_next"
seed: 1024

output_dir: "output/osp_next_14b_81f720p_sparse2d2_ssp4"

training_iteration: 1000000
# ddp_size: 1
fsdp_size: 32
cp_size: 2
skiparse_cp_size: 4
use_context_parallel: False
use_skiparse_context_parallel: True
reshard_after_forward: True
explicit_prefetching_num_blocks: 0
gradient_checkpointing: True
gradient_accumulation_steps: 1
init_max_grad_norm: 1.0
log_interval: 1
save_interval: 500
weight_dtype: "bf16"
ema_decay: 0.999 # 14B用0.999
ema_update_interval: 1
save_with_dcp_api: True
profiling: False

wandb_config:
  project_name: "osp_next"
  exp_name: "osp_next_14b_81f720p_sparse2d2_ssp4"

model_config:
  dim: 5120
  ffn_dim: 13824
  freq_dim: 256
  in_dim: 16
  num_heads: 40
  num_layers: 40
  out_dim: 16
  text_len: 512
  skiparse_model_type: "dual_end"
  sparse_ratio: 2
  num_full_blocks: 8
  num_register_tokens: 0
  skiparse_1d: False
  skiparse_2d: True
  pretrained_model_dir_or_checkpoint: "Wan2.1-T2V-14B/want2v_14b.pt"

scheduler_config:
  scheduler_name: "flow_matching"
  use_dynamic_shifting: True
  use_logitnorm_time_sampling: True

vae_config:
  vae_path: "Wan2.1-T2V-14B/Wan2.1_VAE.pth"
  dtype: "fp16"

text_encoder_config:
  text_len: 512
  checkpoint_path: "Wan2.1-T2V-14B/models_t5_umt5-xxl-enc-bf16.pth"
  use_fsdp: True

data_config:
  batch_size: 1
  num_workers: 16
  pin_memory: False
  drop_last: True
  shuffle: True
  dataset_name: "wan_t2v"
  dataset_config:
    metafile_or_dir_path: "/home/ma-user/work/data/osp-yuan/hq_videos_81f720p/filtered_samples_2572816.lmdb"
    text_tokenizer_path: "/home/ma-user/work/gyy/TorchDiff/Wan2.1-T2V-14B/google/umt5-xxl"
    text_drop_ratio: 0.1
    sample_height: 720
    sample_width: 1280
    sample_num_frames: 81
    train_fps: 16
    tokenizer_max_length: 512
    return_prompt_mask: True
  sampler_name: "stateful_distributed"
  collator_name: "wan_t2v"
  
optimizer_config:
  lr: 0.00002 # 2e-5
  weight_decay: 0.001 # 1e-3

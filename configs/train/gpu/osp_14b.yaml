# test yaml

model_name: "osp_next"
seed: 1024

output_dir: "output/osp_next_dual_end_skiparse_cp"

training_iteration: 1000000
# ddp_size: 1
fsdp_size: 8
cp_size: 4
skiparse_cp_size: 4
use_context_parallel: True
use_skiparse_context_parallel: False
reshard_after_forward: True
explicit_prefetching_num_blocks: 0 # 不采用显式 prefetching 优化
gradient_checkpointing: True
gradient_accumulation_steps: 1
init_max_grad_norm: 1.0
log_interval: 1
save_interval: 1000
weight_dtype: "bf16"
ema_decay: 0.9999
ema_update_interval: 1
save_with_dcp_api: True
profiling: False

wandb_config:
  project_name: "osp_next"
  exp_name: "osp_next"

model_config:
  dim: 5120
  ffn_dim: 13824
  freq_dim: 256
  in_dim: 16
  num_heads: 40
  num_layers: 40
  out_dim: 16
  text_len: 512
  skiparse_model_type: "dual_end"
  sparse_ratio: 2
  num_full_blocks: 8
  num_register_tokens: 0
  skiparse_1d: False
  skiparse_2d: True
  pretrained_model_dir_or_checkpoint: "output/osp_next_14b_init"

scheduler_config:
  scheduler_name: "flow_matching"
  use_dynamic_shifting: True
  use_logitnorm_time_sampling: True

vae_config:
  vae_path: "Wan2.1-T2V-1.3B/Wan2.1_VAE.pth"
  dtype: "fp32"

text_encoder_config:
  text_len: 512
  checkpoint_path: "Wan2.1-T2V-1.3B/models_t5_umt5-xxl-enc-bf16.pth"
  use_fsdp: True

data_config:
  batch_size: 1
  num_workers: 16
  pin_memory: False
  drop_last: True
  shuffle: True
  dataset_name: "t2v_random"
  dataset_config:
    text_tokenizer_path: "Wan2.1-T2V-1.3B/google/umt5-xxl"
    sample_height: 720
    sample_width: 1280
    sample_num_frames: 81
    tokenizer_max_length: 512
    return_prompt_mask: True
  sampler_name: "stateful_distributed"
  collator_name: "wan_t2v"
  
optimizer_config:
  lr: 0.00002
  weight_decay: 0

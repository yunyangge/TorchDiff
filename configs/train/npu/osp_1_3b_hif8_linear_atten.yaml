# OSP-Next 1.3B  HIF8 quantization-aware training config  (NPU)
# Full HIF8 mode: both Linear projections AND Q/K/V attention inputs are quantized.
#
# quant: "hif8"      →  Q/K/V/O projections and FFN up/down layers use HIF8Linear
#                        (activation × weight double-quantization)
# quant_attn: "hif8" →  Q, K, V tensors are further quantized BEFORE entering SDPA
#                        (simulates quantization error in the attention score computation)
# Either or both can be set to null to disable the corresponding quantization.
#
# scale_max_forward : HIF8 representable max for activations/weights (default 15)
# scale_max_backward: HIF8 representable max for gradients            (default 224)

model_name: "osp_next"
seed: 1024

output_dir: "output/osp_next_hif8_linear_atten"

training_iteration: 1000000
fsdp_size: 8
cp_size: 4
skiparse_cp_size: 2
use_context_parallel: False
use_skiparse_context_parallel: True
reshard_after_forward: False
explicit_prefetching_num_blocks: 2
gradient_checkpointing: True
gradient_accumulation_steps: 1
init_max_grad_norm: 1.0
log_interval: 1
save_interval: 1000
weight_dtype: "bf16"
ema_decay: 0.9993
ema_update_interval: 1
save_with_dcp_api: True
profiling: False   # NPU profiling disabled (known issue)

wandb_config:
  project_name: "osp_next"
  exp_name: "osp_next_uni_1_3b_81f480p_sparse2d2_ssp2_hif8_linear_atten"

model_config:
  dim: 1536
  ffn_dim: 8960
  freq_dim: 256
  in_dim: 16
  num_heads: 12
  num_layers: 30
  out_dim: 16
  text_len: 512
  skiparse_model_type: "uniform"
  sparse_ratio: 2
  num_full_blocks: 10
  num_register_tokens: 0
  skiparse_1d: False
  skiparse_2d: True
  lock_main_parameters: False
  training_with_full: False
  pretrained_model_dir_or_checkpoint: "/home/ma-user/work/gyy/TorchDiff/Wan2.1-T2V-1.3B/diffusion_pytorch_model.safetensors"
  pretrained_full_model_dir_or_checkpoint: "/home/ma-user/work/gyy/TorchDiff/Wan2.1-T2V-1.3B/diffusion_pytorch_model.safetensors"
  # ----- HIF8 quantization settings -----
  # Linear projections (Q/K/V/O/FFN): quant-dequant on activation AND weight
  quant: "hif8"
  # Attention kernel inputs (Q/K/V before SDPA): quant-dequant on the head tensors
  quant_attn: "hif8"
  # Scale clamps shared by both quant and quant_attn
  scale_max_forward: 15.0    # HIF8 forward max  (activation / weight scale)
  scale_max_backward: 224.0  # HIF8 backward max (gradient scale)

scheduler_config:
  scheduler_name: "flow_matching"
  use_dynamic_shifting: True
  use_logitnorm_time_sampling: True

vae_config:
  vae_path: "/home/ma-user/work/gyy/TorchDiff/Wan2.1-T2V-1.3B/Wan2.1_VAE.pth"
  dtype: "fp16"

text_encoder_config:
  text_len: 512
  checkpoint_path: "/home/ma-user/work/gyy/TorchDiff/Wan2.1-T2V-1.3B/models_t5_umt5-xxl-enc-bf16.pth"
  use_fsdp: True

data_config:
  batch_size: 1
  num_workers: 16
  pin_memory: False
  drop_last: True
  shuffle: True
  dataset_name: "wan_t2v"
  dataset_config:
    metafile_or_dir_path: "/home/ma-user/work/data/osp-yuan/hq_videos_81f720p/filtered_samples_2572816.lmdb"
    text_tokenizer_path: "/home/ma-user/work/gyy/TorchDiff/Wan2.1-T2V-1.3B/google/umt5-xxl"
    text_drop_ratio: 0.1
    sample_height: 480
    sample_width: 832
    sample_num_frames: 81
    train_fps: 16
    tokenizer_max_length: 512
    return_prompt_mask: True
  sampler_name: "stateful_distributed"
  collator_name: "wan_t2v"

optimizer_config:
  lr: 0.00002  # 2e-5
  weight_decay: 0.001  # 1e-3
